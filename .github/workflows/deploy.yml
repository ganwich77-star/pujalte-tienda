name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - nueva-version

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🔨 Construir aplicación (standalone)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'
          # Las variables de entorno para la construcción se leen de los Secrets de GitHub

      - name: 📦 Preparar Standalone (incluyendo estáticos)
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r public .next/standalone/ || true
          cp -r .next/static/* .next/standalone/.next/static/ || true
          echo "Desplegado el: $(date)" > .next/standalone/public/version.txt
          
      - name: 🚀 Subir archivos a Hostinger (via SSH rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          ARGS: "-avz --delete"
          SOURCE: ".next/standalone/"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          TARGET: ${{ secrets.HOSTINGER_REMOTE_TARGET }}
          EXCLUDE: "/node_modules/"



      # El script de build de package.json ya copia public y static dentro de standalone.
      # rsync los subirá al servidor de forma eficiente.

      - name: 🔄 Reiniciar Proceso Node en Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script: |
            # 🔍 RASTREADOR DE BINARIOS ULTRA-AGRESIVO
            # Intentar cargar perfiles estándar
            [ -f ~/.bashrc ] && source ~/.bashrc
            [ -f ~/.profile ] && source ~/.profile
            
            # 1. Intentar localizar Node/NVM automáticamente
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$HOME/bin:$HOME/.local/bin
            
            # Buscar la ruta de Node si no está en el PATH
            if ! command -v node &> /dev/null; then
              NODE_LOC=$(find $HOME -name node -type f -executable 2>/dev/null | head -n 1)
              if [ ! -z "$NODE_LOC" ]; then
                export PATH=$(dirname "$NODE_LOC"):$PATH
              fi
            fi
            
            # 🔍 OPERACIÓN DRON: Localizar el nido de la aplicación
            echo "--- INFORME DE RECONOCIMIENTO ---"
            echo "Buscando instalaciones de Next.js en todo el servidor..."
            find $HOME -name "next.config.js" 2>/dev/null
            echo "Buscando procesos vivos de BUN..."
            ps aux | grep bun | grep -v grep || echo "No hay procesos Bun activos."
            echo "--- FIN DEL INFORME ---"
            
            # 2. Navegar al proyecto
            cd ${{ secrets.HOSTINGER_REMOTE_TARGET }}

            
            # 3. Lanzar Prisma
            NPX_BIN=$(command -v npx || find $HOME -name npx -type f -executable 2>/dev/null | head -n 1)
            $NPX_BIN prisma db push --accept-data-loss
            
            # 5. LIMPIEZA PROFUNDA Y REINICIO FRÍO
            rm -rf .next/cache
            
            PM2_NAME="pujalte-store"
            PM2_BIN=$(command -v pm2 || find $HOME -name pm2 -type f -executable 2>/dev/null | head -n 1)
            
            if [ ! -z "$PM2_BIN" ]; then
              $PM2_BIN stop $PM2_NAME || true
              $PM2_BIN delete $PM2_NAME || true
              $PM2_BIN start server.js --name $PM2_NAME
              $PM2_BIN save
            else
              $NPX_BIN pm2 stop $PM2_NAME || true
              $NPX_BIN pm2 delete $PM2_NAME || true
              $NPX_BIN pm2 start server.js --name $PM2_NAME || node server.js &
            fi




