name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - nueva-version

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🔨 Construir aplicación (standalone)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'
          # Las variables de entorno para la construcción se leen de los Secrets de GitHub

      - name: 📦 Preparar Standalone (incluyendo estáticos)
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r public .next/standalone/ || true
          cp -r .next/static/* .next/standalone/.next/static/ || true
          echo "Desplegado el: $(date)" > .next/standalone/public/version.txt
          
      - name: 🚀 Subir archivos a Hostinger (via SSH rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: ".next/standalone/"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          TARGET: "domains/pujaltefotografia.basecode.es/public_html"
          EXCLUDE: "/node_modules/"

      - name: 🔄 Reiniciar Proceso en Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script: |
            # 1. Navegar y LIMPIEZA TOTAL (Para no dejar nada viejo)
            cd domains/pujaltefotografia.basecode.es/public_html
            
            # 2. Matar proceso antiguo (Forzado)
            fuser -k 3000/tcp || killall node || true
            
            # 3. Borrar basura de caché de Next.js
            rm -rf .next/cache
            
            # 4. Base de datos
            npx prisma db push --accept-data-loss
            
            # 5. Arrancar Limpio
            HOSTNAME=0.0.0.0 PORT=3000 nohup node server.js > out.log 2>&1 &
            
            sleep 5
            echo "--- LOGS DE ARRANQUE ---"
            ps aux | grep 'node server.js' | grep -v grep
            tail -n 10 out.log




