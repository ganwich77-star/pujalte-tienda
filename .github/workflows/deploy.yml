name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - nueva-version

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🔨 Construir aplicación (standalone)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'
          # Las variables de entorno para la construcción se leen de los Secrets de GitHub

      - name: 📦 Preparar Despliegue (sacar estáticos a la luz)
        run: |
          # 1. Creamos un pack de despliegue limpio
          mkdir -p deploy/public
          mkdir -p deploy/_next/static
          
          # 2. Copiamos el servidor standalone
          cp -r .next/standalone/* deploy/
          
          # 3. SACAMOS los estáticos fuera de carpetas ocultas
          # Esto es vital para que Hostinger no bloquee el acceso al diseño
          cp -r .next/static/* deploy/_next/static/
          cp -r public/* deploy/public/
          
      - name: 🚀 Subir archivos a Hostinger (Lanzallamas - Limpieza Total)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "deploy/"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          TARGET: "domains/pujaltefotografia.basecode.es/public_html"
          EXCLUDE: "/node_modules/"

      - name: 🔄 Reiniciar Proceso (Fresco y Directo)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script: |
            cd domains/pujaltefotografia.basecode.es/public_html
            
            # Limpieza total del motor
            fuser -k 3000/tcp || killall node || true
            rm -rf .next/cache
            
            # Base de datos
            npx prisma db push --accept-data-loss
            
            # Arrancar con visibilidad total
            HOSTNAME=0.0.0.0 PORT=3000 nohup node server.js > out.log 2>&1 &
            
            sleep 5
            ps aux | grep 'node server.js' | grep -v grep
            tail -n 10 out.log




