name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - nueva-version

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🔨 Construir aplicación (standalone)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'
          # Las variables de entorno para la construcción se leen de los Secrets de GitHub

      - name: 📦 Preparar Standalone (incluyendo estáticos)
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r public .next/standalone/ || true
          cp -r .next/static/* .next/standalone/.next/static/ || true
          echo "Desplegado el: $(date)" > .next/standalone/public/version.txt
          
      - name: 🚀 Subir archivos a Hostinger (via SSH rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: ".next/standalone/"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          TARGET: "/home/u348231268/domains/pujaltefotografia.basecode.es/public_html"
          EXCLUDE: "/node_modules/"

      - name: 🔄 Reiniciar Proceso en Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script: |
            # 1. Navegar a la carpeta real
            cd /home/u348231268/domains/pujaltefotografia.basecode.es/public_html
            
            # 2. Matar cualquier proceso que esté usando el puerto 3000
            fuser -k 3000/tcp || true
            
            # 3. Lanzar Prisma para asegurar base de datos (con Bun si está disponible)
            if command -v bun &> /dev/null; then
              bun npx prisma db push --accept-data-loss
              # 4. Reiniciar el servidor con BUN (Ultra rápido)
              nohup bun run server.js > out.log 2>&1 &
            else
              npx prisma db push --accept-data-loss
              # 4. Reiniciar con Node si Bun no está en el path directo
              nohup node server.js > out.log 2>&1 &
            fi
            
            sleep 5
            echo "--- ESTADO FINAL ---"
            ps aux | grep -E 'node server|bun server' | grep -v grep




