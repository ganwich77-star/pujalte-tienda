name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - nueva-version

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🔨 Construir aplicación (standalone)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'
          # Las variables de entorno para la construcción se leen de los Secrets de GitHub

      - name: 🚀 Subir archivos a Hostinger (via SSH rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: ".next/standalone/"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          TARGET: ${{ secrets.HOSTINGER_REMOTE_TARGET }}
          EXCLUDE: "/node_modules/, /public/, /.next/static/" # rsync solo standalone, el build script ya maneja la copia interna

      # El script de build de package.json ya copia public y static dentro de standalone.
      # rsync los subirá al servidor de forma eficiente.

      - name: 🔄 Reiniciar Proceso Node en Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script: |
            # Forzar la carga de Node.js y NVM (común en Hostinger)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -f ~/.bashrc ] && source ~/.bashrc
            
            # Asegurar que el PATH incluya rutas comunes de binarios si fallan las anteriores
            export PATH=$PATH:$HOME/bin:$HOME/.local/bin:$HOME/nodevenv/bin
            
            cd ${{ secrets.HOSTINGER_REMOTE_TARGET }}
            
            # Verificar si npx existe antes de lanzar
            if ! command -v npx &> /dev/null; then
              echo "ERROR: npx no encontrado. Intentando cargar configuración de Hostinger..."
              export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            fi
            
            # Sincronizar base de datos
            npx prisma db push --accept-data-loss
            
            # Reiniciar pm2 o arrancar si no existe
            PM2_NAME="pujalte-store"
            if command -v pm2 &> /dev/null && pm2 list | grep -q "$PM2_NAME"; then
              pm2 restart $PM2_NAME
            else
              # Si pm2 no está en el PATH, intentamos lanzarlo con npx o buscar la ruta nvm
              npx pm2 start server.js --name $PM2_NAME || pm2 start server.js --name $PM2_NAME || echo "Fallo crítico al arrancar PM2"
            fi
            pm2 save || npx pm2 save

